<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Combat Companion — Player</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/player.css">
</head>
<body>
  <!-- ── TOP BAR ──────────────────────────────────────────── -->
  <div class="topbar">
    <span class="logo">⚔️ <span id="char-name">Player</span></span>
    <span class="spacer"></span>
    <div class="ws-status">
      <span class="status-dot" id="ws-dot"></span>
      <span id="ws-label">connecting...</span>
    </div>
    <span id="player-currency" class="session-badge" style="cursor:pointer;color:var(--accent)" title="Click to transfer">💰 —</span>
    <span class="session-badge">Session: <strong id="session-code">—</strong></span>
    <button class="btn btn-ghost btn-sm" id="btn-open-map">🗺️ Map</button>
  </div>

  <!-- Map Modal -->
  <div id="map-modal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.85);flex-direction:column">
    <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg-surface);border-bottom:1px solid var(--border)">
      <span style="font-weight:700;flex:1">🗺️ Map</span>
      <button class="btn btn-ghost btn-sm" id="btn-close-map">✕ Close</button>
    </div>
    <div style="flex:1;position:relative;overflow:hidden">
      <canvas id="player-map-canvas" style="display:block;width:100%;height:100%"></canvas>
    </div>
  </div>

  <div class="main-layout">
    <div class="main-area">
      <!-- ── HP CARD ──────────────────────────────────────── -->
      <div class="hp-card" id="hp-card">
        <div class="hp-big" id="hp-display">20 / 20</div>
        <div class="hp-label">Hit Points · KD: <span id="kd-display">10</span></div>
        <div class="hp-bar-container hp-bar-lg"><div class="hp-bar" id="hp-bar" style="width:100%;background:var(--hp-high)"></div></div>
      </div>

      <!-- ── STATUS EFFECTS ────────────────────────────────── -->
      <div id="player-status-badges" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;min-height:0"></div>

      <!-- ── STATS ────────────────────────────────────────── -->
      <div class="stats-grid" id="stats-grid"></div>

      <!-- ── PANELS ROW 1: Attack & Damage + Incoming ─────── -->
      <div class="panels-row">
        <section class="panel">
          <div class="panel-header"><h2>⚔️ Attack & Damage Roll</h2></div>
          <div class="panel-body" id="attack-body"></div>
        </section>
        <section class="panel">
          <div class="panel-header"><h2>🛡️ Incoming Damage</h2></div>
          <div class="panel-body" id="defense-body"></div>
        </section>
      </div>

      <!-- ── PANELS ROW 2: Recovery + Turn Counter ────────── -->
      <div class="panels-row">
        <section class="panel">
          <div class="panel-header"><h2>💚 HP Recovery</h2></div>
          <div class="panel-body" id="heal-body"></div>
        </section>
        <section class="panel">
          <div class="panel-header"><h2>⏱️ Turn Counter</h2></div>
          <div class="panel-body" id="turns-body"></div>
        </section>
      </div>

      <!-- ── PANELS ROW 3: Effects ────────────────────────── -->
      <div class="panels-row">
        <section class="panel panel-full">
          <div class="panel-header"><h2>✨ Effects & Passive Bonuses</h2></div>
          <div class="panel-body" id="effects-body"></div>
        </section>
      </div>

      <!-- ── PANELS ROW: Inventory ─────────────────────────── -->
      <div class="panels-row">
        <section class="panel panel-full">
          <div class="panel-header" style="display:flex;align-items:center;gap:12px">
            <h2 style="flex:1">🎒 Inventory</h2>
            <span class="currency-display" id="currency-display">
              <span class="curr-plat" id="curr-plat" style="display:none">💎 <strong>0</strong>P</span>
              <span class="curr-gold" id="curr-gold">🪙 <strong>0</strong>G</span>
              <span class="curr-silver" id="curr-silver">🥈 <strong>0</strong>S</span>
              <span class="curr-copper" id="curr-copper">🟤 <strong>0</strong>C</span>
            </span>
            <span style="font-size:0.78rem;color:var(--text-muted)">Weight: <strong id="weight-display">0</strong></span>
            <button class="btn btn-ghost btn-xs" id="btn-open-shop">🛒 Shop</button>
          </div>
          <div class="panel-body">
            <!-- Equipment Slots -->
            <div class="equipment-panel" id="equipment-panel">
              <h3 style="font-size:0.82rem;margin-bottom:8px">⚔️ Equipment</h3>
              <div class="equip-slots-grid" id="equip-slots-grid"></div>
            </div>
            <hr class="section-divider">
            <!-- Inventory Filter Tabs -->
            <div class="inv-filter-tabs" id="inv-filter-tabs">
              <button class="btn btn-ghost btn-xs inv-filter active" data-inv-filter="all">All</button>
              <button class="btn btn-ghost btn-xs inv-filter" data-inv-filter="equipped">Equipped</button>
              <button class="btn btn-ghost btn-xs inv-filter" data-inv-filter="weapon">Weapons</button>
              <button class="btn btn-ghost btn-xs inv-filter" data-inv-filter="armor">Armor</button>
              <button class="btn btn-ghost btn-xs inv-filter" data-inv-filter="potion">Potions</button>
              <button class="btn btn-ghost btn-xs inv-filter" data-inv-filter="misc">Misc</button>
            </div>
            <div id="inventory-grid" class="inventory-grid"></div>
          </div>
        </section>
      </div>

      <!-- Slot selector modal -->
      <div id="slot-selector-modal" class="modal-overlay" style="display:none">
        <div class="modal-panel" style="max-width:340px">
          <div class="modal-header"><h3>Select Equipment Slot</h3><button class="btn-icon" id="slot-modal-close">✕</button></div>
          <div class="modal-body">
            <div class="slot-selector-grid" id="slot-selector-grid"></div>
          </div>
        </div>
      </div>

      <!-- ── LOG ──────────────────────────────────────────── -->
      <div class="panels-row">
        <section class="panel panel-full">
          <div class="panel-header" style="display:flex;align-items:center;gap:12px">
            <h2 style="flex:1">📜 Log</h2>
            <button class="btn btn-ghost btn-xs log-tab-btn active" data-log-tab="calc">Calc Log</button>
            <button class="btn btn-ghost btn-xs log-tab-btn" data-log-tab="rolls">Roll History</button>
          </div>
          <div class="panel-body">
            <div id="calc-log" class="calc-log"></div>
            <div id="roll-history-log" class="calc-log" style="display:none"></div>
          </div>
        </section>
      </div>
    </div>

    <!-- ── SIDEBAR: Enemy Damage Calc ─────────────────────── -->
    <div class="sidebar-right">
      <h2 style="margin-bottom:12px">🎯 Enemy Damage Calc</h2>
      <div id="enemy-calc-body"></div>
    </div>
  </div>

  <script src="/static/js/websocket-client.js"></script>
  <script src="/static/js/map-canvas.js"></script>
  <script src="/static/js/player-app.js"></script>
</body>
</html>
