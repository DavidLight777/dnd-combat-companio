<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Combat Companion — Player</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/player.css">
</head>
<body>
  <!-- ── TOP BAR ──────────────────────────────────────────── -->
  <div class="topbar">
    <span class="logo">⚔️ <span id="char-name">Player</span></span>
    <span class="spacer"></span>
    <div class="ws-status">
      <span class="status-dot" id="ws-dot"></span>
      <span id="ws-label">connecting...</span>
    </div>
    <span class="session-badge">Session: <strong id="session-code">—</strong></span>
    <button class="btn btn-ghost btn-sm" id="btn-open-map">🗺️ Map</button>
  </div>

  <!-- Map Modal -->
  <div id="map-modal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.85);flex-direction:column">
    <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg-surface);border-bottom:1px solid var(--border)">
      <span style="font-weight:700;flex:1">🗺️ Map</span>
      <button class="btn btn-ghost btn-sm" id="btn-close-map">✕ Close</button>
    </div>
    <div style="flex:1;position:relative;overflow:hidden">
      <canvas id="player-map-canvas" style="display:block;width:100%;height:100%"></canvas>
    </div>
  </div>

  <div class="main-layout">
    <div class="main-area">
      <!-- ── HP CARD ──────────────────────────────────────── -->
      <div class="hp-card" id="hp-card">
        <div class="hp-big" id="hp-display">20 / 20</div>
        <div class="hp-label">Hit Points · KD: <span id="kd-display">10</span></div>
        <div class="hp-bar-container hp-bar-lg"><div class="hp-bar" id="hp-bar" style="width:100%;background:var(--hp-high)"></div></div>
      </div>

      <!-- ── STATS ────────────────────────────────────────── -->
      <div class="stats-grid" id="stats-grid"></div>

      <!-- ── PANELS ROW 1: Attack & Damage + Incoming ─────── -->
      <div class="panels-row">
        <section class="panel">
          <div class="panel-header"><h2>⚔️ Attack & Damage Roll</h2></div>
          <div class="panel-body" id="attack-body"></div>
        </section>
        <section class="panel">
          <div class="panel-header"><h2>🛡️ Incoming Damage</h2></div>
          <div class="panel-body" id="defense-body"></div>
        </section>
      </div>

      <!-- ── PANELS ROW 2: Recovery + Turn Counter ────────── -->
      <div class="panels-row">
        <section class="panel">
          <div class="panel-header"><h2>💚 HP Recovery</h2></div>
          <div class="panel-body" id="heal-body"></div>
        </section>
        <section class="panel">
          <div class="panel-header"><h2>⏱️ Turn Counter</h2></div>
          <div class="panel-body" id="turns-body"></div>
        </section>
      </div>

      <!-- ── PANELS ROW 3: Effects ────────────────────────── -->
      <div class="panels-row">
        <section class="panel panel-full">
          <div class="panel-header"><h2>✨ Effects & Passive Bonuses</h2></div>
          <div class="panel-body" id="effects-body"></div>
        </section>
      </div>

      <!-- ── LOG ──────────────────────────────────────────── -->
      <div class="panels-row">
        <section class="panel panel-full">
          <div class="panel-header" style="display:flex;align-items:center;gap:12px">
            <h2 style="flex:1">📜 Log</h2>
            <button class="btn btn-ghost btn-xs log-tab-btn active" data-log-tab="calc">Calc Log</button>
            <button class="btn btn-ghost btn-xs log-tab-btn" data-log-tab="rolls">Roll History</button>
          </div>
          <div class="panel-body">
            <div id="calc-log" class="calc-log"></div>
            <div id="roll-history-log" class="calc-log" style="display:none"></div>
          </div>
        </section>
      </div>
    </div>

    <!-- ── SIDEBAR: Enemy Damage Calc ─────────────────────── -->
    <div class="sidebar-right">
      <h2 style="margin-bottom:12px">🎯 Enemy Damage Calc</h2>
      <div id="enemy-calc-body"></div>
    </div>
  </div>

  <script src="/static/js/websocket-client.js"></script>
  <script src="/static/js/map-canvas.js"></script>
  <script src="/static/js/player-app.js"></script>
</body>
</html>
