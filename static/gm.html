<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Combat Companion — Game Master</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/gm.css">
</head>
<body>
  <!-- ── TOP BAR ──────────────────────────────────────────── -->
  <div class="gm-topbar">
    <span class="logo">⚔️ Game Master</span>
    <span class="spacer"></span>
    <div class="ws-status">
      <span class="status-dot" id="ws-dot"></span>
      <span id="ws-label">connecting...</span>
    </div>
    <span style="font-size:0.82rem">Players: <strong id="player-count">0</strong></span>
    <span class="session-code-badge" id="session-code" title="Click to copy code">----</span>
    <button class="btn btn-ghost btn-sm" id="btn-end-session">End Session</button>
  </div>

  <div class="gm-body">
    <!-- ── SIDEBAR: Party List ────────────────────────────── -->
    <div class="gm-sidebar">
      <div class="gm-sidebar-header">
        <h2>Party & NPCs</h2>
        <button class="btn btn-ghost btn-xs" id="btn-show-npc-form">+ NPC</button>
      </div>
      <div class="gm-sidebar-body">
        <div id="npc-form-area" class="hidden"></div>
        <div id="party-list"></div>
      </div>
    </div>

    <!-- ── MAIN AREA ──────────────────────────────────────── -->
    <div class="gm-main">
      <!-- Info cards -->
      <div class="info-grid">
        <div class="info-card"><div class="label">Session</div><div class="value" id="session-name">—</div></div>
        <div class="info-card"><div class="label">Status</div><div class="value" id="session-status">waiting</div></div>
        <div class="info-card"><div class="label">Turn</div><div class="value" id="session-turn">0</div></div>
        <div class="info-card"><div class="label">Connected</div><div class="value" id="connected-count">0</div></div>
      </div>

      <!-- Tabs -->
      <div class="gm-tabs">
        <button class="gm-tab active" data-tab="detail">Character Detail</button>
        <button class="gm-tab" data-tab="actions">Quick Actions</button>
        <button class="gm-tab" data-tab="log">Event Log</button>
      </div>

      <!-- TAB: Character Detail -->
      <div class="tab-content active" id="tab-detail">
        <div id="char-detail" style="padding:16px">
          <p class="text-muted">Select a character from the sidebar to view details.</p>
        </div>
      </div>

      <!-- TAB: Quick Actions -->
      <div class="tab-content" id="tab-actions" style="padding:16px">
        <div class="detail-panel">
          <div class="detail-header"><h2>⚔️ Damage All Players</h2></div>
          <div class="detail-body">
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
              <label style="font-size:0.8rem;color:var(--text-muted)">Enemy Roll:</label>
              <input type="number" id="aoe-enemy-roll" style="width:60px">
              <label style="font-size:0.8rem;color:var(--text-muted)">Damage:</label>
              <input type="number" id="aoe-damage" style="width:60px">
              <button class="btn btn-danger btn-sm" id="btn-aoe-damage">Apply to All</button>
            </div>
            <div class="result-box" id="aoe-result" style="margin-top:8px"><span class="text-muted">—</span></div>
          </div>
        </div>
      </div>

      <!-- TAB: Event Log -->
      <div class="tab-content" id="tab-log" style="padding:16px">
        <div class="detail-panel">
          <div class="detail-header"><h2>📜 Event Log</h2></div>
          <div class="detail-body">
            <div class="event-log" id="event-log"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/websocket-client.js"></script>
  <script src="/static/js/gm-app.js"></script>
</body>
</html>
