<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Combat Companion — Game Master</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <style>
    .gm-topbar {
      display: flex; align-items: center; gap: 16px;
      padding: 12px 20px; background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
    }
    .gm-topbar h1 { font-size: 1.1rem; flex: 1; }
    .session-code {
      font-family: var(--font-body); font-size: 1.1rem; font-weight: 700;
      color: var(--accent); background: var(--bg-surface-3);
      padding: 4px 12px; border-radius: var(--r-md); letter-spacing: 0.1em;
      cursor: pointer; user-select: all;
    }
    .gm-body { display: flex; height: calc(100vh - 53px); }
    .gm-sidebar {
      width: 280px; min-width: 280px; background: var(--bg-surface);
      border-right: 1px solid var(--border); padding: 16px;
      overflow-y: auto;
    }
    .gm-sidebar h2 { font-size: 0.85rem; margin-bottom: 12px; }
    .gm-main { flex: 1; padding: 20px; overflow-y: auto; }

    .player-card {
      background: var(--bg-surface-2); border: 1px solid var(--border);
      border-radius: var(--r-md); padding: 10px 12px; margin-bottom: 8px;
    }
    .player-card .name { font-weight: 600; font-size: 0.9rem; }
    .player-card .hp-info { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }

    .info-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px; margin-bottom: 24px;
    }
    .info-card {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: var(--r-md); padding: 14px;
    }
    .info-card .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }
    .info-card .value { font-size: 1.4rem; font-weight: 700; color: var(--accent); margin-top: 2px; }
  </style>
</head>
<body>
  <div class="gm-topbar">
    <h1>⚔️ Game Master</h1>
    <div class="ws-status">
      <span class="status-dot" id="ws-dot"></span>
      <span id="ws-label">connecting...</span>
    </div>
    <span>Players: <strong id="player-count">0</strong></span>
    <span class="session-code" id="session-code" title="Click to copy">----</span>
    <button class="btn btn-ghost btn-sm" id="btn-end-session">End Session</button>
  </div>

  <div class="gm-body">
    <div class="gm-sidebar">
      <h2>Party</h2>
      <div id="party-list"><p class="text-muted" style="font-size:0.8rem">Waiting for players...</p></div>
    </div>

    <div class="gm-main">
      <div class="info-grid">
        <div class="info-card">
          <div class="label">Session</div>
          <div class="value" id="session-name">—</div>
        </div>
        <div class="info-card">
          <div class="label">Status</div>
          <div class="value" id="session-status">waiting</div>
        </div>
        <div class="info-card">
          <div class="label">Turn</div>
          <div class="value" id="session-turn">0</div>
        </div>
        <div class="info-card">
          <div class="label">Connected</div>
          <div class="value" id="connected-count">0</div>
        </div>
      </div>

      <h2 style="margin-bottom:12px">Event Log</h2>
      <div class="card">
        <div class="event-log" id="event-log"></div>
      </div>
    </div>
  </div>

  <script src="/static/js/websocket-client.js"></script>
  <script>
    const $ = s => document.querySelector(s);
    const params = new URLSearchParams(window.location.search);
    const sessionCode = params.get('code') || sessionStorage.getItem('session_code');
    const gmToken = sessionStorage.getItem('gm_token');

    if (!sessionCode || !gmToken) {
      window.location.href = '/';
    }

    $('#session-code').textContent = sessionCode;
    $('#session-code').addEventListener('click', () => {
      navigator.clipboard.writeText(sessionCode);
      showToast('Session code copied!');
    });

    // ── WS Connection ────────────────────────────────────────
    const ws = new WsClient(sessionCode, gmToken);

    function addLogEntry(event, text) {
      const log = $('#event-log');
      const time = new Date().toLocaleTimeString();
      const div = document.createElement('div');
      div.className = 'entry';
      div.innerHTML = `<span class="time">[${time}]</span> <span class="event-name">${event}</span> ${text}`;
      log.prepend(div);
      // Keep max 50 entries
      while (log.children.length > 50) log.removeChild(log.lastChild);
    }

    function updatePartyList(characters) {
      const list = $('#party-list');
      if (!characters || characters.length === 0) {
        list.innerHTML = '<p class="text-muted" style="font-size:0.8rem">Waiting for players...</p>';
        return;
      }
      list.innerHTML = characters.map(c => {
        const pct = c.max_hp > 0 ? (c.current_hp / c.max_hp * 100) : 0;
        const color = pct > 50 ? 'var(--hp-high)' : pct > 25 ? 'var(--hp-mid)' : 'var(--hp-low)';
        const badge = c.is_npc ? ' <span style="font-size:0.65rem;background:var(--accent-purple);color:#fff;padding:1px 5px;border-radius:3px">NPC</span>' : '';
        return `
          <div class="player-card">
            <div class="name">${c.name}${badge}</div>
            <div class="hp-info">HP: ${c.current_hp} / ${c.max_hp} · KD: ${c.armor_class}</div>
            <div class="hp-bar-container" style="margin-top:4px">
              <div class="hp-bar" style="width:${pct}%;background:${color}"></div>
            </div>
          </div>
        `;
      }).join('');
    }

    ws.on('_connected', () => {
      $('#ws-dot').className = 'status-dot connected';
      $('#ws-label').textContent = 'connected';
      addLogEntry('system', 'WebSocket connected');
    });

    ws.on('_disconnected', () => {
      $('#ws-dot').className = 'status-dot disconnected';
      $('#ws-label').textContent = 'disconnected';
      addLogEntry('system', 'WebSocket disconnected');
    });

    ws.on('_reconnecting', (data) => {
      $('#ws-label').textContent = `reconnecting (${data.attempt})...`;
    });

    ws.on('session.state', (data) => {
      const s = data.session;
      $('#session-name').textContent = s.name;
      $('#session-status').textContent = s.status;
      $('#session-turn').textContent = s.turn_number;
      $('#connected-count').textContent = data.connected_count;
      $('#player-count').textContent = (data.characters || []).filter(c => !c.is_npc).length;
      updatePartyList(data.characters);
      addLogEntry('session.state', `Session loaded: ${s.name}`);
    });

    ws.on('session.player_joined', (data) => {
      $('#connected-count').textContent = data.connected_count;
      addLogEntry('session.player_joined', `${data.role} joined (${data.connected_count} connected)`);
      // Refresh character list
      refreshCharacters();
    });

    ws.on('session.player_disconnected', (data) => {
      $('#connected-count').textContent = data.connected_count;
      addLogEntry('session.player_disconnected', `${data.role} left (${data.connected_count} connected)`);
    });

    // Listen for any event and log it
    ws.on('*', (event, data) => {
      if (event.startsWith('_') || event === 'session.state') return;
      if (event !== 'session.player_joined' && event !== 'session.player_disconnected') {
        addLogEntry(event, JSON.stringify(data).substring(0, 100));
      }
    });

    async function refreshCharacters() {
      try {
        const res = await fetch(`/api/sessions/${sessionCode}/characters`);
        if (res.ok) {
          const chars = await res.json();
          updatePartyList(chars);
          $('#player-count').textContent = chars.filter(c => !c.is_npc).length;
        }
      } catch (e) { /* silent */ }
    }

    // End session
    $('#btn-end-session').addEventListener('click', async () => {
      if (!confirm('End this session?')) return;
      await fetch(`/api/sessions/${sessionCode}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ gm_token: gmToken, status: 'ended' }),
      });
      ws.disconnect();
      window.location.href = '/';
    });

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }

    ws.connect();
  </script>
</body>
</html>
